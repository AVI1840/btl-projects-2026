<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563A8"/>
      <stop offset="100%" stop-color="#1B4A80"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="98" fill="url(#bg)"/>
  <!-- Menorah symbol - clean 7-branch design -->
  <g transform="translate(100,88)" fill="white">
    <!-- Central stem -->
    <rect x="-3" y="-42" width="6" height="58" rx="3"/>
    <!-- Inner pair -->
    <path d="M0,4 C0,4 -14,-2 -20,-36" stroke="white" stroke-width="5.5" fill="none" stroke-linecap="round"/>
    <path d="M0,4 C0,4 14,-2 20,-36" stroke="white" stroke-width="5.5" fill="none" stroke-linecap="round"/>
    <!-- Middle pair -->
    <path d="M0,10 C0,10 -26,2 -36,-32" stroke="white" stroke-width="5.5" fill="none" stroke-linecap="round"/>
    <path d="M0,10 C0,10 26,2 36,-32" stroke="white" stroke-width="5.5" fill="none" stroke-linecap="round"/>
    <!-- Outer pair -->
    <path d="M0,16 C0,16 -36,8 -50,-26" stroke="white" stroke-width="5.5" fill="none" stroke-linecap="round"/>
    <path d="M0,16 C0,16 36,8 50,-26" stroke="white" stroke-width="5.5" fill="none" stroke-linecap="round"/>
    <!-- Flames -->
    <ellipse cx="0" cy="-46" rx="4" ry="6.5" fill="#FFD866"/>
    <ellipse cx="-20" cy="-40" rx="4" ry="6.5" fill="#FFD866"/>
    <ellipse cx="20" cy="-40" rx="4" ry="6.5" fill="#FFD866"/>
    <ellipse cx="-36" cy="-36" rx="4" ry="6.5" fill="#FFD866"/>
    <ellipse cx="36" cy="-36" rx="4" ry="6.5" fill="#FFD866"/>
    <ellipse cx="-50" cy="-30" rx="4" ry="6.5" fill="#FFD866"/>
    <ellipse cx="50" cy="-30" rx="4" ry="6.5" fill="#FFD866"/>
    <!-- Base -->
    <rect x="-28" y="16" width="56" height="6" rx="3" fill="white"/>
    <path d="M-34,28 L34,28 L28,22 L-28,22 Z" fill="white"/>
    <rect x="-38" y="28" width="76" height="6" rx="3" fill="white"/>
  </g>
  <!-- Text -->
  <text x="100" y="148" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="11" font-weight="700" letter-spacing="1">המוסד לביטוח לאומי</text>
</svg>