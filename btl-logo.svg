<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#1B3A5C"/>
    </radialGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <!-- Stylized menorah/hands - BTL official emblem -->
  <g transform="translate(100,100) scale(0.85)" fill="white">
    <!-- Base/foundation -->
    <path d="M-45,45 L45,45 L40,38 L-40,38 Z"/>
    <path d="M-35,38 L35,38 L30,32 Q0,28 -30,32 Z"/>
    <!-- Center stem -->
    <rect x="-5" y="-35" width="10" height="67" rx="3"/>
    <!-- Left branches -->
    <path d="M-5,15 Q-30,10 -38,-20 L-28,-22 Q-22,5 -5,10 Z"/>
    <path d="M-5,5 Q-20,-5 -25,-30 L-15,-32 Q-12,-8 -5,0 Z"/>
    <!-- Right branches -->
    <path d="M5,15 Q30,10 38,-20 L28,-22 Q22,5 5,10 Z"/>
    <path d="M5,5 Q20,-5 25,-30 L15,-32 Q12,-8 5,0 Z"/>
    <!-- Flame tips -->
    <ellipse cx="0" cy="-40" rx="5" ry="8"/>
    <ellipse cx="-17" cy="-36" rx="4" ry="7"/>
    <ellipse cx="17" cy="-36" rx="4" ry="7"/>
    <ellipse cx="-30" cy="-26" rx="4" ry="7" transform="rotate(-15,-30,-26)"/>
    <ellipse cx="30" cy="-26" rx="4" ry="7" transform="rotate(15,30,-26)"/>
    <ellipse cx="-40" cy="-24" rx="4" ry="6" transform="rotate(-25,-40,-24)"/>
    <ellipse cx="40" cy="-24" rx="4" ry="6" transform="rotate(25,40,-24)"/>
  </g>
</svg>